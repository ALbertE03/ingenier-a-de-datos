services:
  database:
    image: postgres:17-alpine
    container_name: ecotrans-db
    environment:
      POSTGRES_USER: ecotrans
      POSTGRES_PASSWORD: ecotrans123
      POSTGRES_DB: ecotrans
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecotrans -d ecotrans"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ecotrans_net

  backend:
    build: ./backend
    container_name: ecotrans-api
    depends_on:
      database:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql+asyncpg://ecotrans:ecotrans123@database:5432/ecotrans"
      SECRET_KEY: "ecotrans_secret_key_change_in_production"
      ALGORITHM: "HS256"
      ACCESS_TOKEN_EXPIRE_MINUTES: "60"
      ADMIN_EMAIL: "admin@ecotrans.com"
      ADMIN_PASSWORD: "admin123"
      ORIGINS: "http://localhost:3000,http://frontend:3000"
    ports:
      - "8000:8000"
    networks:
      - ecotrans_net
    command: >
      sh -c "uv run alembic upgrade heads
      && uv run python populate_db.py
      && uv run python src/utils/fetch_weather.py
      && uv run uvicorn main:app --host 0.0.0.0 --port 8000"

  frontend:
    build: ./frontend/id
    container_name: ecotrans-frontend
    depends_on:
      - backend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:8000"
    networks:
      - ecotrans_net

networks:
  ecotrans_net:
    driver: bridge

volumes:
  postgres_data:
